<section class="login-page section">
  <div class="container">
    <div class="login-card">
      <h1>Admin Login</h1>
      <p>Access protected dashboard and secured routes.</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            [class.error]="(submitted || f['email'].touched) && f['email'].errors"
            placeholder="admin@softvisionxr.com" />
          <div class="error-message" *ngIf="(submitted || f['email'].touched) && f['email'].errors">
            <span *ngIf="f['email'].errors && f['email'].errors['required']">Email is required.</span>
            <span *ngIf="f['email'].errors && f['email'].errors['email']">Enter a valid email address.</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            [class.error]="(submitted || f['password'].touched) && f['password'].errors"
            placeholder="Enter password" />
          <div class="error-message" *ngIf="(submitted || f['password'].touched) && f['password'].errors">
            <span *ngIf="f['password'].errors && f['password'].errors['required']">Password is required.</span>
            <span *ngIf="f['password'].errors && f['password'].errors['minlength']">Minimum 8 characters required.</span>
          </div>
        </div>

        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
        </button>

        <p class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</p>
      </form>

      <div class="demo-note">
        Demo credentials: <strong>admin@softvisionxr.com</strong> / <strong>Admin@123</strong>
      </div>
    </div>
  </div>
</section>
