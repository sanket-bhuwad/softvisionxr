<div class="services-page">
  <section class="page-hero">
    <div class="container">
      <h1>Our Services</h1>
      <p>Comprehensive technology solutions to drive your business forward</p>
    </div>
  </section>

  <section class="services-list section">
    <div class="container">
      <div class="service-detail" *ngFor="let service of services">
        <div class="service-header">
          <div class="service-icon">{{ service.icon }}</div>
          <div>
            <h2>{{ service.title }}</h2>
            <p>{{ service.description }}</p>
          </div>
        </div>
        <div class="service-features">
          <h3>Key Features:</h3>
          <ul>
            <li *ngFor="let feature of service.features">{{ feature }}</li>
          </ul>
        </div>
      </div>
    </div>
  </section>

  <section class="cta-section section">
    <div class="container">
      <h2>Ready to Get Started?</h2>
      <p>Let's discuss how we can help transform your business with our innovative solutions.</p>
      <button class="btn btn-primary" (click)="navigateTo('/contact')">Contact Us</button>
    </div>
  </section>
</div>
