<section class="panel">
  <div class="panel-header">
    <h2>Overview</h2>
    <p>Real-time snapshot of product, people, and growth health.</p>
  </div>

  <div class="kpi-grid">
    <article class="kpi-card" *ngFor="let card of kpiCards">
      <span>{{ card.label }}</span>
      <h3>{{ card.value }}</h3>
      <small>{{ card.trend }} vs last month</small>
    </article>
  </div>

  <article class="todo-card">
    <h3>Priority Actions</h3>
    <ul>
      <li *ngFor="let task of tasks">{{ task }}</li>
    </ul>
  </article>
</section>
